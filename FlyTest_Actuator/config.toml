[server]
ws_url = "ws://127.0.0.1:8000/ws/ui/actuator/"
api_url = "http://127.0.0.1:8000"
use_gui = true
api_username = "admin"
api_password = "admin123456"

[actuator]
name = "FlyTest-001"

[browser]
browser_type = "chromium"
headless = false
persistent = false
user_data_dir = "./data/browser"
launch_timeout = 30
action_timeout = 10

[execution]
retry_count = 3
step_interval = 100
screenshot_dir = "./data/screenshots"
max_concurrent = 3

[trace]
enabled = true
trace_dir = "./data/traces"
screenshots = true
snapshots = true
sources = false

[logging]
level = "INFO"
